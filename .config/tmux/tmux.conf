# Reload config
bind r source-file ~/.config/tmux/tmux.conf

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear
bind -T copy-mode-vi MouseDown1Pane select-pane \; send -X clear-selection
bind -T copy-mode-vi Escape send -X cancel

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g extended-keys on
set -as terminal-features ',xterm-256color:extkeys'
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off
set-option -g status-position top

# Enable extended keys (CSI u encoding) for proper modifier key support
# Allows Shift+Enter, Ctrl+Shift+<key>, etc. to work correctly in apps
# NOTE: "always" forces CSI-u sequences to ALL panes (not just those that request it)
# This is required because pi/claude-code don't send the kitty keyboard protocol
# activation sequence. The tradeoff is that fish/zsh need explicit bindings for
# the CSI-u Shift+Enter sequence (see fish conf.d/tmux_keys.fish)
set -s extended-keys always
set -s extended-keys-format csi-u

# scripts
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Theme — Vague
run-shell '~/.config/tmux/themes/vague.tmux'
