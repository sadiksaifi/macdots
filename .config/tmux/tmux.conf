# Reload config
bind r source-file ~/.config/tmux/tmux.conf

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear
bind -T copy-mode-vi MouseDown1Pane select-pane \; send -X clear-selection


# Terminal — tell tmux what Ghostty supports
set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm-ghostty:RGB:usstyle:clipboard'

# General
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard external
set -g allow-passthrough on
set -g detach-on-destroy no-detached
set -g status-position top


# Switch windows with Meta+number (no prefix)
# Terminal emulator must map Cmd+N → Meta+N for Cmd key support
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# scripts
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Theme — Vague
run-shell '~/.config/tmux/themes/vague.tmux'

# Plugins

# Set custom plugin directory
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

# Auto-install TPM if not present
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM (must be last line)
run '~/.config/tmux/plugins/tpm/tpm'
